spring.application.name=demo

# Replace with your actual database connection details
spring.datasource.url=jdbc:postgresql://localhost:5432/${DB_NAME}?currentSchema=public
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# Automatically update the database schema based on your JPA entities
# spring.jpa.hibernate.ddl-auto=update  
# ตั้งค่าแบบจะ Drop Table และ Create ใหม่ทุกครั้งที่แอปพลิเคชันเริ่มต้น (ใช้สำหรับการพัฒนาเท่านั้น)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
jwt.secret=my_super_secret_key_12345
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration
logging.level.org.springframework.web.servlet.handler.HandlerMappingIntrospector=OFF