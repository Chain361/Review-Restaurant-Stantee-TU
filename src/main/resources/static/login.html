<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - HotSnow</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Prompt', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: 
                radial-gradient(rgba(255, 255, 255, 0.15) 2px, transparent 2px),
                radial-gradient(rgba(255, 255, 255, 0.15) 2px, transparent 2px),
                linear-gradient(180deg, #60646a 0%, #e0e2e5 100%);
            background-size: 30px 30px, 30px 30px, 100% 100%;
            background-position: 0 0, 15px 15px, 0 0;
        }

        .login-box {
            background-color: #3b3e43;
            width: 100%;
            max-width: 420px;
            padding: 60px 50px 40px 50px;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            flex-direction: column;
        }

        .login-box h2 {
            color: #ffffff;
            font-size: 32px;
            font-weight: 500;
            text-align: center;
            margin-bottom: 50px;
            letter-spacing: 0.5px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 20px;
            background-color: #55585d;
            border: none;
            border-radius: 10px;
            color: #ffffff;
            font-size: 14px;
            outline: none;
        }

        .input-group input::placeholder {
            color: #9ea1a6;
        }

        .login-submit-btn {
            width: 100%;
            padding: 14px;
            margin-top: 15px;
            background-color: #7d94a3;
            color: #ffffff;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-submit-btn:hover {
            background-color: #6a808f;
        }

        .divider {
            height: 1px;
            background-color: #55585d;
            margin: 30px 0 20px 0;
        }

        .register-link {
            text-align: left;
            font-size: 12px;
            color: #9ea1a6;
        }

        .register-link a {
            color: #7d94a3;
            text-decoration: underline;
            margin-left: 5px;
        }

        .register-link a:hover {
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>เข้าสู่ระบบ</h2>
        
        <form>
            <div class="input-group">
                <input type="text" placeholder="Username" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="login-submit-btn">เข้าสู่ระบบ</button>
        </form>

        <div class="divider"></div>

        <div class="register-link">
            ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        </div>
    </div>

</body>
</html>
