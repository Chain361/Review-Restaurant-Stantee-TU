<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(to bottom, #6b737a 0%, #d8dce0 100%);
            position: relative;
            z-index: 1;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .login-card {
            background-color: #ecf0f4;
            width: 100%;
            max-width: 380px;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .login-card h2 {
            text-align: center;
            color: #3b434a;
            font-size: 32px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background-color: #ccd3da;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-family: 'Prompt', sans-serif;
            color: #4a5560;
            box-sizing: border-box;
            outline: none;
            transition: background-color 0.3s;
        }

        .input-group input::placeholder {
            color: #8c97a1;
        }

        .input-group input:focus {
            background-color: #c0c7cf;
        }

        .login-btn {
            width: 100%;
            padding: 12px 20px;
            margin-top: 30px;
            background-color: #798d9a;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-family: 'Prompt', sans-serif;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .login-btn:hover {
            background-color: #647682;
        }

        .divider {
            height: 1px;
            background-color: #ccd3da;
            margin: 30px 0 20px 0;
            border: none;
        }

        .register-link {
            text-align: left; 
            font-size: 13px;
            color: #9ba6b0;
            margin: 0;
        }

        .register-link a {
            color: #798d9a;
            text-decoration: underline;
            margin-left: 5px;
        }

        .register-link a:hover {
            color: #5d6e7a;
        }

        .error-message {
            color: #d32f2f;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>เข้าสู่ระบบ</h2>
        
        <div class="error-message" id="errorMessage"></div>
        
        <form id="loginForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="ชื่อผู้ใช้" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="รหัสผ่าน" required>
            </div>
            
            <button type="submit" class="login-btn">เข้าสู่ระบบ</button>
        </form>

        <hr class="divider">

        <p class="register-link">
            ยังไม่มีบัญชี? <a href="register.html">สมัครสมาชิก</a>
        </p>
    </div>

 <script>
    const loginForm = document.getElementById('loginForm');
    const errorMessage = document.getElementById('errorMessage');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');

    loginForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorMessage.classList.remove('show');

        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        try {
            const response = await fetch('http://localhost:8080/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            if (response.status === 200) {
                const data = await response.json();
                
                sessionStorage.setItem('accessToken', data.accessToken);
                sessionStorage.setItem('role', data.role);
                sessionStorage.setItem('username', data.username);
                sessionStorage.setItem('firstName', data.firstName);
                
                console.log("Login Success, Role:", data.role); 

                if (data.role === 'ADMIN') {
                    window.location.href = 'admin-place-detail.html'; 
                } else {                
                    window.location.href = 'homepage.html';
                }
        

            } else if (response.status === 401) {
                const data = await response.json();
                errorMessage.textContent = data.message || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง';
                errorMessage.classList.add('show');
                passwordInput.value = '';
            } else {
                errorMessage.textContent = 'เกิดข้อผิดพลาดในการเข้าสู่ระบบ';
                errorMessage.classList.add('show');
            }
        } catch (error) {
            errorMessage.textContent = 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์';
            errorMessage.classList.add('show');
            console.error('Login error:', error);
        }
    });
</script>
</body>
</html>
