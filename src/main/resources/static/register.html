<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Prompt', sans-serif;
            background: linear-gradient(to bottom, #d8dce0 0%, #6b737a 100%);
            position: relative;
            z-index: 1;
        }

        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: radial-gradient(rgba(255, 255, 255, 0.2) 2px, transparent 2px);
            background-size: 30px 30px;
            z-index: -1;
        }

        .register-card {
            background-color: #ecf0f4;
            width: 100%;
            max-width: 380px;
            padding: 60px 40px;
            border-radius: 12px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        .register-card h2 {
            text-align: center;
            color: #3b434a;
            font-size: 32px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group input {
            width: 100%;
            padding: 12px 20px;
            background-color: #ccd3da;
            border: none;
            border-radius: 25px;
            font-size: 14px;
            font-family: 'Prompt', sans-serif;
            color: #4a5560;
            box-sizing: border-box;
            outline: none;
            transition: background-color 0.3s;
        }

        .input-group input::placeholder {
            color: #8c97a1;
        }

        .input-group input:focus {
            background-color: #c0c7cf;
        }

        .register-btn {
            width: 100%;
            padding: 12px 20px;
            margin-top: 30px;
            background-color: #798d9a;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            font-size: 15px;
            font-family: 'Prompt', sans-serif;
            font-weight: 400;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .register-btn:hover {
            background-color: #647682;
        }

        .divider {
            height: 1px;
            background-color: #ccd3da;
            margin: 30px 0 20px 0;
            border: none;
        }

        .login-link {
            text-align: left; 
            font-size: 13px;
            color: #9ba6b0;
            margin: 0;
        }

        .login-link a {
            color: #798d9a;
            text-decoration: underline;
            margin-left: 5px;
        }

        .login-link a:hover {
            color: #5d6e7a;
        }

        .message {
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            padding: 10px;
            border-radius: 5px;
            display: none;
        }

        .message.show {
            display: block;
        }

        .error-message {
            color: #d32f2f;
            background-color: #ffebee;
            border: 1px solid #ef5350;
        }

        .success-message {
            color: #388e3c;
            background-color: #f1f8e9;
            border: 1px solid #7cb342;
        }
    </style>
</head>
<body>

    <div class="register-card">
        <h2>สมัครสมาชิก</h2>
        
        <div id="message" class="message"></div>
        
        <form id="registerForm">
            <div class="input-group">
                <input type="text" id="username" name="username" placeholder="ชื่อผู้ใช้" required>
            </div>
            <div class="input-group">
                <input type="password" id="password" name="password" placeholder="รหัสผ่าน" required>
            </div>
            <div class="input-group">
                <input type="text" id="firstname" name="firstname" placeholder="ชื่อจริง" required>
            </div>
            <div class="input-group">
                <input type="text" id="lastname" name="lastname" placeholder="นามสกุล" required>
            </div>
            
            <button type="submit" class="register-btn">สมัครสมาชิก</button>
        </form>

        <hr class="divider">

        <p class="login-link">
            มีบัญชีอยู่แล้ว? <a href="login.html">เข้าสู่ระบบ</a>
        </p>
    </div>

    <script>
        const registerForm = document.getElementById('registerForm');
        const messageDiv = document.getElementById('message');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const firstnameInput = document.getElementById('firstname');
        const lastnameInput = document.getElementById('lastname');

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            messageDiv.classList.remove('show', 'error-message', 'success-message');

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();
            const firstname = firstnameInput.value.trim();
            const lastname = lastnameInput.value.trim();

            try {
                const response = await fetch('http://localhost:8080/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        username: username,
                        password: password,
                        firstname: firstname,
                        lastname: lastname
                    })
                });

                if (response.status === 201) {
                    const data = await response.json();
                    
                    // Show success message
                    messageDiv.textContent = data.message || 'ลงทะเบียนสำเร็จ';
                    messageDiv.classList.add('show', 'success-message');
                    
                    // Clear form
                    registerForm.reset();
                    
                    // Redirect to login page after 2 seconds
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                } else if (response.status === 409) {
                    const data = await response.json();
                    
                    // Show conflict message
                    messageDiv.textContent = data.message || 'ชื่อผู้ใช้นี้มีอยู่แล้ว';
                    messageDiv.classList.add('show', 'error-message');
                } else {
                    const data = await response.json();
                    console.log(data.message);
                    messageDiv.textContent = 'เกิดข้อผิดพลาดในการสมัครสมาชิก';
                    messageDiv.classList.add('show', 'error-message');
                }
            } catch (error) {
                messageDiv.textContent = 'ไม่สามารถเชื่อมต่อกับเซิร์ฟเวอร์';
                messageDiv.classList.add('show', 'error-message');
                console.error('Register error:', error);
            }
        });
    </script>
</body>
</html>
