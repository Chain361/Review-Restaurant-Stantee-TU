<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - สถานที่</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="brand-text">
                    <h2>HotSnow</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            
            <div class="menu-section">จัดการข้อมูล</div>
            
            <a href="admin-place-detail.html" class="menu-item active">
                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                สถานที่
            </a>
            <a href="admin-menu.html" class="menu-item">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                เมนูอาหาร
            </a>
            <a href="admin-review.html" class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                รีวิว
            </a>
        </div>
        
        <div class="logout">
            <span style="margin-right: 8px;">[→</span> ออกจากระบบ
        </div>
    </aside>

    <main class="main-content">
        <div class="breadcrumb">
            Admin / <span>สถานที่</span>
        </div>

        <div class="page-header">
            <h1>สถานที่ทั้งหมด</h1>
            <button class="btn-add"><a href="admin-editplace.html" style="text-decoration: none; color: white;" >+ เพิ่มสถานที่</a></button>
        </div>

        <div class="card">
            <div class="toolbar">
                <div class="search-box">
                    <input type="text" placeholder="ค้นหาชื่อสถานที่...">
                </div>
                <div class="filter-box">
                    <select>
                        <option>ทุกหมวดหมู่</option>
                    </select>
                </div>
            </div>

            <table>
                <thead>
                    <tr>
                        <th style="width: 50px;">ภาพ</th>
                        <th>ชื่อสถานที่</th>
                        <th>หมวดหมู่</th>
                        <th>เวลาเปิด-ปิด</th>
                        <th>คะแนน</th>
                        <th>รีวิว</th>
                        <th>จัดการ</th>
                    </tr>
                </thead>
                <tbody id="place-tbody">
                </tbody>
            </table>

            <div class="pagination">
                <a href="#" class="page-item">&larr; ก่อนหน้า</a>
                <a href="#" class="page-item active">1</a>
                <a href="#" class="page-item">2</a>
                <a href="#" class="page-item">3</a>
                <a href="#" class="page-item">ถัดไป &rarr;</a>
            </div>
        </div>
    </main>


<script>
    document.addEventListener('DOMContentLoaded', loadTopPlaces);

    async function loadTopPlaces() {
        const tbody = document.getElementById('place-tbody');
        try {
            const res = await fetch('/places/top');
            const json = await res.json();
            if (json.status !== 'success') return;

            tbody.innerHTML = json.data.map(place => {
                const img = place.images && place.images.length > 0
                    ? `<img src="${place.images[0]}" style="width:40px;height:40px;object-fit:cover;border-radius:4px;">`
                    : `<div class="img-placeholder"></div>`;
                const rating = place.rating ? place.rating.toFixed(1) : '-';
                return `
                    <tr>
                        <td>${img}</td>
                        <td><div class="location-name">${place.name}</div></td>
                        <td>-</td>
                        <td>-</td>
                        <td><span class="rating">★</span> <span class="rating-text">${rating}</span></td>
                        <td>${place.reviewCount}</td>
                        <td>
                            <div class="action-btns">
                                <button class="btn-delete" onclick="deletePlace(${place.id})">ลบ</button>
                            </div>
                        </td>
                    </tr>`;
            }).join('');
        } catch (err) {
            console.error('ดึงข้อมูลไม่สำเร็จ', err);
        }
    }

    async function deletePlace(id) {
        if (!confirm('ยืนยันการลบสถานที่นี้?')) return;
        const token = sessionStorage.getItem('accessToken');
        try {
            const res = await fetch(`/admin/places/delete/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const json = await res.json();
            if (json.status === 'success') {
                alert('ลบสถานที่สำเร็จ');
                loadTopPlaces();
            } else {
                alert('เกิดข้อผิดพลาด: ' + (json.message || ''));
            }
        } catch (err) {
            console.error(err);
            alert('เกิดข้อผิดพลาด');
        }
    }

    document.querySelector('.logout').addEventListener('click', () => {
        sessionStorage.clear();
        window.location.href = 'login.html';
    });
</script>
</body>
</html>
