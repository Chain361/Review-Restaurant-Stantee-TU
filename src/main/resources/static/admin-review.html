<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - จัดการรีวิว</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/admin.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .review-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .review-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background-color: white;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .reviewer-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .avatar {
            width: 40px;
            height: 40px;
            background-color: #f3f4f6;
            color: #4b5563;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            font-weight: 600;
        }
        .reviewer-name {
            font-size: 12px;
            font-weight: 600;
            color: #333;
        }
        .review-meta {
            font-size: 10px;
            color: #888;
            margin-top: 2px;
        }
        .review-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .stars {
            color: #f59e0b;
            font-size: 14px;
            letter-spacing: 2px;
        }
        .btn-delete-review {
            border: 1px solid #fca5a5;
            color: #c9302c;
            background-color: #fef2f2;
            border-radius: 20px;
            padding: 4px 15px;
            font-size: 10px;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
        }
        .review-body {
            font-size: 10px;
            color: #333;
            margin-left: 55px;
        }
        body.swal2-shown {
        padding-right: 0 !important;
        overflow-y: auto !important;
        }

        html.swal2-shown, body.swal2-shown {
        height: auto !important;
        overflow: auto !important;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-top">
            <div class="brand">
                <div class="brand-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                </div>
                <div class="brand-text">
                    <h2>HotSnow</h2>
                    <span>Admin Panel</span>
                </div>
            </div>
            <div class="menu-section">จัดการข้อมูล</div>
            <a href="admin-place-detail.html" class="menu-item">
                <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                สถานที่
            </a>
            <a href="admin-menu.html" class="menu-item">
                <svg viewBox="0 0 24 24"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
                เมนูอาหาร
            </a>
            <a href="admin-review.html" class="menu-item active">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                รีวิว
            </a>
        </div>
        <div class="logout" onclick="sessionStorage.clear(); window.location.href='login.html';" style="cursor:pointer;">
            <span style="margin-right: 8px;">[→</span> ออกจากระบบ
        </div>
    </aside>

    <main class="main-content">
        <div class="breadcrumb">Admin / <span>รีวิว</span></div>
        <div class="page-header"><h1 style="font-size: 20px;">จัดการรีวิว</h1></div>

        <div class="toolbar" style="background-color: white; padding: 15px; border-radius: 8px; border: 1px solid #e0e0e0; display: flex; gap: 10px;">
            <div class="search-box" style="flex: 1;">
                <input type="number" id="searchPlaceId" placeholder="ใส่ Place ID เพื่อดึงข้อมูลรีวิว..." style="border: 1px solid #e0e0e0; width: 100%; outline: none; padding: 8px 15px; border-radius: 4px;">
            </div>
            <button onclick="fetchReviewsByPlace()" style="background-color: #798d9a; color: white; border: none; padding: 8px 25px; border-radius: 4px; cursor: pointer; font-family: 'Kanit';">
                ค้นหา
            </button>
        </div>

        <div class="review-list" id="reviewListContainer" style="margin-top: 15px;">
            <div style="text-align: center; padding: 40px; color: #888;">กรุณาใส่ Place ID และกดปุ่มเพื่อดึงข้อมูลรีวิว</div>
        </div>
    </main>

    <script>
        if (sessionStorage.getItem('role') !== 'ADMIN') {
            window.location.href = 'homepage.html';
        }

        async function fetchReviewsByPlace() {
            const placeId = document.getElementById('searchPlaceId').value;
            const container = document.getElementById('reviewListContainer');
            if (!placeId) return;
            container.innerHTML = '<div style="text-align: center; padding: 20px;">กำลังโหลด...</div>';
            try {
                const response = await fetch(`http://localhost:8080/places/${placeId}`);
                const data = await response.json();
                const reviews = data.reviews || [];
                if (reviews.length === 0) {
                    container.innerHTML = '<div style="text-align: center; padding: 20px; color: #c9302c;">ไม่พบรีวิวสำหรับสถานที่นี้</div>';
                    return;
                }
                container.innerHTML = reviews.map(rev => `
                    <div class="review-item">
                        <div class="review-header">
                            <div class="reviewer-info">
                                <div class="avatar">${rev.username ? rev.username.substring(0,2).toUpperCase() : 'US'}</div>
                                <div class="reviewer-details">
                                    <div class="reviewer-name">${rev.username || 'Anonymous'}</div>
                                    <div class="review-meta">ID รีวิว: ${rev.reviewID}</div>
                                </div>
                            </div>
                            <div class="review-actions">
                                <div class="stars">${'★'.repeat(rev.rating)}${'☆'.repeat(5-rev.rating)}</div>
                                <button class="btn-delete-review" onclick="deleteReview(${rev.reviewID})">ลบรีวิว</button>
                            </div>
                        </div>
                        <div class="review-body">${rev.comment || 'ไม่มีข้อความรีวิว'}</div>
                    </div>
                `).join('');
            } catch (error) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: red;">เชื่อมต่อ Server ไม่สำเร็จ</div>';
            }
        }

        async function deleteReview(reviewId) {
    const result = await Swal.fire({
        title: 'ยืนยันการลบรีวิว?',
        text: `คุณกำลังจะลบรีวิวหมายเลข ${reviewId} การกระทำนี้ไม่สามารถย้อนกลับได้`,
        icon: 'warning',
        backdrop: `rgba(0,0,0,0.4)`, // ใส่สีพื้นหลังเองแทนการให้ระบบจัดการ
        heightAuto: false,            // ห้ามปรับความสูง body อัตโนมัติ
        scrollbarPadding: false,
        showCancelButton: true,
        confirmButtonColor: '#c9302c',
        cancelButtonColor: '#798d9a',   
        confirmButtonText: 'ใช่, ลบเลย!',
        cancelButtonText: 'ยกเลิก',
        reverseButtons: true
    });

    if (result.isConfirmed) {
        const token = sessionStorage.getItem('accessToken');
        
        try {
            Swal.showLoading();

            const response = await fetch(`http://localhost:8080/reviews/delete/${reviewId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                await Swal.fire({
                    title: 'ลบสำเร็จ!',
                    text: 'ข้อมูลรีวิวถูกลบออกจากระบบแล้ว',
                    icon: 'success',
                    confirmButtonColor: '#798d9a'
                });
                fetchReviewsByPlace(); 
            } else {
                Swal.fire('เกิดข้อผิดพลาด', 'ไม่สามารถลบได้ (อาจติดสิทธิ์ ADMIN)', 'error');
            }
        } catch (error) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อกับ Server ได้', 'error');
        }
    }
}
    </script>
</body>
</html>
